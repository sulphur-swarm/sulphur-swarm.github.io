{{- define "main" }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{- if .Params.subtitle }}
    <div class="post-description">{{ .Params.subtitle }}</div>
    {{- end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>

{{- end }}{{/* end main */}}
