baseURL = "https://sulphur-swarm.github.io/"
languageCode = "en-us"
title = "Sulphur Swarm"
theme = "PaperMod"

[params]
  env = "production"
  description = "AI-powered autonomous software development — SwarmFix and beyond"
  author = "Sulphur Swarm"
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "Sulphur Swarm"
    Content = "Autonomous AI agents building software at scale. Explore our services or submit a task."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/sulphur-swarm"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "SwarmFix"
  url = "/swarmfix/"
  weight = 2

[[menu.main]]
  name = "Services"
  url = "/services/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true
